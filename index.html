      {

        sections: {
          believe: [
            P("Oneness Pentecostalism (also called 'Jesus Only' or Apostolic Pentecostalism) teaches that God is absolutely one - not a Trinity of three persons, but one God who manifests himself in different modes: as Father in creation, as Son in incarnation, and as Holy Spirit in regeneration. This is the ancient heresy of modalism, revived in the early 20th century following the Azusa Street revival."),

            P("Major Oneness denominations include the United Pentecostal Church International (UPCI) and the Pentecostal Assemblies of the World (PAW). Combined, they represent several million members worldwide."),

          whyRight: [
            P("Oneness Pentecostals argue that 'Father, Son, and Holy Spirit' in Matthew 28:19 is the description, not the name - and the name is 'Jesus.' Acts 2:38 records Peter commanding baptism 'in the name of Jesus Christ,' not in the Trinitarian formula, suggesting the apostles understood Jesus's command differently."),
            P("They argue the Trinity is a 4th-century invention - Nicaea imposed Greek tritheism on a Hebrew monotheism. The Shema ('the LORD is one') demands absolute numerical oneness, and the Trinity divides God into three."),

          againstChrist: [

            LI([

          theirTexts: [
            NOTE("Acts 2:38: 'Repent and be baptized every one of you in the name of Jesus Christ for the forgiveness of your sins, and you will receive the gift of the Holy Spirit.' The Oneness baptismal formula."),
            NOTE("Deuteronomy 6:4 (the Shema): 'The LORD our God, the LORD is one.' Read as absolute numerical oneness - not a Trinity of three persons."),

          christianResponse: [
            P("On modalism: if the Father and Son are the same person in different modes, Jesus's baptism is theater - who speaks from heaven while Jesus stands in the water? Three simultaneous distinct actions - Jesus being baptized, the Spirit descending, the Father speaking from heaven - cannot all be the same person:"),
            V("Matthew 3:16-17"),
            P("On Acts 2:38 vs. Matthew 28:19: the early church's practice varied in expression but was always Trinitarian in understanding. 'In the name of Jesus' in Acts does not replace the Trinitarian formula - it signals that the baptism is done under Christ's authority (not John's baptism, not Moses's purification). Jesus gave the formula; the apostles applied it in Christ's authority. The formula is the Trinitarian name; the authority is Christ's."),

            P("On John 10:30 ('I and the Father are one'): the Greek hen ('one') is neuter - one thing, not one person. If it meant personal identity, 'we are' (plural verb) would be incoherent - you cannot say 'I and the Father, we, am one person.' The plural verb keeps the persons distinct; the neuter noun keeps them one in essence:"),

            P("On the Shema and absolute oneness: as in the Judaism discussion, echad (one) allows for composite unity - the same word is used for a man and wife who are 'one flesh.' The Shema does not settle between unipersonal monotheism and Trinitarian monotheism:"),

            P("On Acts 2:38 and tongues as required: Acts 2:38 does not say tongues are required for salvation - it promises the gift of the Holy Spirit. The gift of the Spirit can be received without the specific manifestation of tongues (1 Corinthians 12:30 - 'do all speak in tongues? Do all have gifts of healing?' - the expected answer is no)."),

          theirRebuttal: [

            LI([

          counterRebuttal: [
            P("On Matthew 3 being 'one God in three modes': for the Father's voice and the dove to be present while Jesus stands in the water, the same person would have to be in two locations performing two different roles simultaneously. Modes are sequential in modalism (Father in creation, Son in incarnation) - simultaneous manifestation at the baptism breaks the modal structure."),
            P("On 1 Corinthians 12:30 and tongues: the Greek construction me pantes (οὐ πάντες) expects a negative answer - not all speak in tongues. Whatever the referent (public or private), Paul explicitly states that not every believer has the gift of tongues. If tongues are the required initial evidence of Spirit reception for all believers, Paul is asking an absurd question."),
            P("On 'one name = Jesus': Matthew 28:19 says 'in the name of the Father and of the Son and of the Holy Spirit' - three distinct identifying descriptions under one name. The 'name' is singular because there is one God; the three identifications are given because there are three persons. If 'name' simply means 'Jesus,' why does Jesus himself use three descriptions rather than simply say 'baptize them in my name'?"),
          ],
          historical: [
            P("The Oneness movement emerged in 1913 at a camp meeting in Arroyo Seco, California, when R.E. McAlister suggested the apostles baptized only in Jesus's name. This sparked a re-baptism movement that split Pentecostalism. It is not an ancient apostolic recovery - it is a 20th-century innovation within the Pentecostal movement. The universal church - East, West, Catholic, and Protestant - baptized in the Trinitarian formula from the earliest records (Didache, c. 100 AD)."),
            P("Modalism (the view that Father, Son, and Spirit are modes of one person) was explicitly condemned by multiple 3rd-century councils. Sabellius (3rd c.) is the most famous modalist; his teaching was rejected by Tertullian, who coined 'Trinity,' and by the pre-Nicene church broadly. The Oneness position is not a Nicene innovation - it is a pre-Nicene heresy that Nicaea affirmed was wrong."),

          philosophical: [
            P("If Jesus is the Father, to whom did Jesus pray? John 17 is Jesus's high priestly prayer - 'Father, glorify me in your own presence with the glory that I had with you before the world existed' (17:5). A person cannot glorify himself in his own presence. The prayer requires a genuine distinction between the one praying and the one prayed to - not a mode addressing another mode of the same person."),
            P("If the Holy Spirit is a mode of the one God (Jesus), Acts 5:3-4 says lying to the Holy Spirit is lying to God - which a Oneness reading affirms. But Acts 7:55-56 has Stephen see 'the glory of God, and Jesus standing at the right hand of God' - two distinct entities, simultaneously present. The right hand of God is not Jesus standing at the right hand of himself."),
          ],
          traps: [
            P("Trap 1 - Treating Oneness Pentecostals as non-Christians or cultists. Many are sincere, Spirit-filled believers who have encountered God genuinely. The disagreement is about the nature of God and the baptismal formula - serious, but within the household of those who confess Christ."),
            P("Trap 2 - Agreeing that 'one name = Jesus' to be agreeable. The formula Jesus gave is Trinitarian - Father, Son, Holy Spirit - and the 'one name' is that whole formula. Conceding the Oneness reading of Matthew 28 concedes the central argument."),
            P("Trap 3 - Ignoring the tongues-as-evidence debate entirely. For Oneness believers, this is often the most personally urgent issue. Engage it with 1 Corinthians 12:30 carefully."),

          questions: [
            LI([
              "\"In Matthew 3:16-17, Jesus is baptized, the Spirit descends as a dove, and the Father speaks from heaven - all simultaneously. If these are modes of the same person, how can the same person be standing in the water, descending from heaven as a dove, and speaking from heaven at the same time?\"",
              "\"John 17:5 has Jesus pray to the Father: 'glorify me in your own presence.' Can a person glorify himself in his own presence, or does this require two genuinely distinct persons?\"",
              "\"1 Corinthians 12:30 asks 'do all speak in tongues?' - expecting the answer no. If tongues are the required evidence of Spirit reception for every believer, what is Paul asking?\"",
              "\"In Acts 7:56, Stephen sees 'the glory of God, and Jesus standing at the right hand of God' - two simultaneously present. How does Jesus stand at the right hand of himself?\"",
              "\"The Didache (c. 96-100 AD), written within the generation of the apostles, instructs: 'Baptize in the name of the Father, Son, and Holy Spirit.' Justin Martyr (c. 150 AD) and Tertullian (c. 200 AD) document Trinitarian baptism as universal practice. If Jesus-only baptism is the original apostolic formula, why is there zero evidence of it in the early church outside the book of Acts?\"",
              "\"If 'in the name of the Father and of the Son and of the Holy Spirit' in Matthew 28:19 means 'in the name of Jesus' - why did Jesus himself give three descriptions rather than simply saying 'baptize in my name'? What is the purpose of 'Father, Son, and Holy Spirit' if it all means just one person?\"",

          theirTension: [
            P("Oneness modalism cannot account for the simultaneous distinct actions at the baptism of Jesus (Matthew 3:16-17), Jesus's high priestly prayer in John 17 (a person praying to himself), or Stephen's vision in Acts 7:55-56 (Jesus at the right hand of God, both simultaneously present). Each of these passages requires two genuinely distinct persons in the same moment - not one person in sequential modes."),
          ],
          ourTension: [
            P("Trinitarian Christians must be able to explain the difference between three persons and three gods - the most common objection. The answer (one being, three persons; distinct in who they are, united in what they are) must be shown from Scripture, not just asserted. The Oneness believer has a genuine point that 'person' is a late Latin theological term not found in Scripture; the concept must be demonstrated from the texts themselves."),

          ],

            P("Seventh-day Adventism grew out of the Millerite movement following the 'Great Disappointment' (October 22, 1844, when Christ did not return as expected). Ellen G. White (1827-1915), a prolific prophetess whose writings the SDA church officially regards as a 'lesser light' pointing to Scripture, was foundational to the movement."),

          counterRebuttal: [

          historical: [

            P("The movement's credibility was damaged by a series of scandals: Jim Bakker (PTL Club, fraud conviction 1989, 45-year prison sentence); Jimmy Swaggart (prostitution scandal 1988); Benny Hinn's divorce and relationship scandals; Todd Bentley (Lakeland Revival 2008, marital infidelity). Kenneth Copeland's ministry has declined to file public financial disclosures while operating a private jet fleet valued in the tens of millions."),
            P("In 2009, Senator Charles Grassley conducted a Senate Finance Committee investigation into six major prosperity gospel ministries (Copeland, Hinn, Dollar, Long, White, and Meyer) for potential tax code violations including personal use of ministry funds for private jets, mansions, and luxury goods. Most refused to cooperate fully with the investigation."),

          philosophical: [

      {
        id: "postmodernism", name: "Postmodernism",
        tagline: "There is no objective truth — only power and perspective",
        family: "Secular", status: "full",
        sections: {
          believe: [
            P("Postmodernism is a philosophical and cultural framework emerging from French philosophy in the mid-20th century (Derrida, Foucault, Lyotard, Rorty) that rejects the Enlightenment's confidence in objective truth, universal reason, and the idea that history makes moral progress. Key claims: (1) there are no meta-narratives (grand stories about the world that are universally true) - Lyotard defines postmodernism as 'incredulity toward meta-narratives'; (2) all knowledge claims are situated - shaped by the speaker's race, gender, class, culture, and power position; (3) language does not describe a pre-existing reality but constructs it; (4) 'truth' is a function of power - whoever defines truth is asserting dominance."),
            P("In practice, postmodernism shows up in everyday conversation as: 'That's just your truth.' 'You can't impose your values on others.' 'All perspectives are equally valid.' 'Who are you to say what's right?' It is less a conscious philosophy than a cultural atmosphere that makes all moral and religious truth claims feel presumptuous or intolerant."),
            P("Postmodernism is distinct from relativism (which says values differ between cultures) and from skepticism (which doubts knowledge generally). It adds the power-analysis layer: truth claims are also power moves."),
          ],
          whyRight: [
            P("Postmodernists argue that the Enlightenment's confident universal rationalism was used to justify colonialism, racism, and cultural imperialism - the 'civilizing mission' of European powers was framed as bringing Reason and Progress to 'primitive' peoples. The claim to possess universal truth has historically been inseparable from the claim to dominate those who don't accept it."),
            P("They point to the genuine diversity of human cultures, moral codes, and epistemologies as evidence that no single framework has universal purchase - the confident assumption of Western rationalism that it alone has the truth is itself a culturally situated assumption."),
            P("They make a linguistic point: words do not transparently refer to things in the world. All description is interpretation; all interpretation is shaped by prior frameworks; there is no view from nowhere. Even scientific description is theory-laden."),
          ],
          againstChrist: [
            P("Stated at full strength:"),
            LI([
              "\"That's just your truth. Christianity works for you, and that's fine - but you can't say it's true for everyone. Truth is personal and cultural, not universal.\"",
              "\"Christian missionaries used the gospel to destroy indigenous cultures, impose Western values, and legitimate colonial domination. 'The Truth' has always been a tool of power against the powerless.\"",
              "\"There is no meta-narrative. The idea that one book, one religion, one story explains all of reality for all people everywhere is exactly the kind of totalizing claim postmodernism deconstructs. It's arrogant and dangerous.\"",
              "\"Moral claims are just preferences dressed up as objective facts. When you say homosexuality or abortion is wrong, you're asserting your cultural values, not discovering a moral reality that exists independently of your tradition.\"",
              "\"Science gives us working models, not absolute truth. Religion gives us stories that comfort people. Neither gives you the right to impose your framework on those who see things differently.\"",
            ]),
          ],
          theirTexts: [
            NOTE("Jean-François Lyotard, The Postmodern Condition (1979): 'Simplifying to the extreme, I define postmodern as incredulity toward metanarratives.' The Christian gospel is precisely a meta-narrative - creation, fall, redemption, consummation - making it the kind of claim postmodernism rejects on principle."),
            NOTE("Michel Foucault, Discipline and Punish (1975): Power and knowledge are inseparable; every claim to truth is also a claim to authority. Religious institutions that define sin, morality, and salvation are also exercising social control."),

          christianResponse: [
            P("On 'that's just your truth - it's true for you but not for me': this statement is self-refuting. The claim 'there is no universal truth' is itself a universal truth claim. It asserts something about the nature of reality for everyone ('truth is relative to the individual or culture'), which is exactly the kind of universal claim it denies. If relativism is really true, then 'relativism is true' is only relatively true - and the Christian is free to relativity disagree. The postmodern can't use universal-sounding claims to deny universals."),
            P("On the power/truth connection: Foucault is right that powerful institutions have used truth claims to oppress - this is historically documented and must be acknowledged. But exposing the abuse of a claim does not refute the claim. If someone uses mathematics to design weapons, that doesn't make 2+2=4 a power move. The question of whether a claim is true is logically independent of the question of whether it has been misused. Christianity's own prophets (Amos, Micah, Isaiah) spent entire books denouncing Israel's powerful institutions for exactly this abuse - power-critique is built into the tradition."),
            P("On 'no meta-narrative': Lyotard's own book The Postmodern Condition is a meta-narrative about why meta-narratives don't work - it tells a universal story about how all universal stories fail. This is unavoidable: humans think in narrative. The choice is not between having a meta-narrative and not having one; it is between a good meta-narrative and a bad one, a true story and a false one. Lyotard's counter-narrative (power suppresses truth, diversity is the highest value, no framework is final) is itself a framework claiming universal purchase."),
            P("On moral relativism (values are just cultural preferences): this position is never lived consistently. Every postmodernist who condemns colonialism, racism, or the suppression of indigenous cultures is making a moral judgment that those things are wrong - not just 'I personally disprefer them' but 'they shouldn't have happened.' That judgment is only meaningful if there is a moral standard above culture by which cultures can be evaluated. You cannot condemn colonialism as wrong and simultaneously claim that all moral frameworks are merely cultural. The condemnation borrows a moral realism that the framework denies."),
            P("On science giving working models rather than truth: this is a sophisticated position (scientific anti-realism) held by some philosophers of science. But it cuts both ways: if science gives only working models, then 'evolution explains all of life without God' and 'the universe is 13.8 billion years old' are also only working models, not facts. The postmodern can't invoke science to dismiss religion and simultaneously hold that science doesn't discover truth."),
            NOTE("John 18:37-38: Jesus says 'For this purpose I was born and for this purpose I have come into the world - to bear witness to the truth. Everyone who is of the truth listens to my voice.' Pilate responds 'What is truth?' - the first recorded postmodern, and the man who handed an innocent person over to execution. The postmodern question is not merely theoretical."),
          ],
          theirRebuttal: [
            P("Likely postmodern responses:"),
            LI([
              "\"The self-refutation argument is a cheap trick. When I say 'truth is perspectival,' I mean it from within my perspective - I'm not claiming to step outside all perspectives to make a god's-eye view claim. All claims are local, including mine.\"",
              "\"Acknowledging that power abuses truth claims doesn't refute postmodernism - you've just proved our point. The question is whether any claim to universal truth can be disentangled from the power structure that produced it.\"",
              "\"You're asking me to condemn colonialism using an objective moral standard - but I'm condemning it from the perspective of the colonized. That's not a universal moral claim; it's a counter-narrative from the margins.\"",

          counterRebuttal: [
            P("On 'I'm only speaking from my perspective, not making universal claims': if the postmodernist's claim about truth is only perspectival, then the Christian's claim about truth is also only perspectival - and the conversation is over because no one can disagree with anyone. But the postmodernist is not actually content with that: they want you to accept that 'you can't impose your truth' and to change your behavior accordingly. That is a universal demand, not a perspectival suggestion. The position breaks down in practice because it must make universal-sounding demands to have any social force."),
            P("On condemning colonialism from the perspective of the colonized: this is a powerful move - but it requires the suffering of the colonized to actually matter morally, not just perspectivally. If all perspectives are equally valid, the colonizer's perspective ('bringing civilization to primitive peoples') is as valid as the colonized perspective ('this is oppression'). Most postmodernists are not willing to say those perspectives are equally valid - which means they are smuggling in a moral realism (the suffering of the oppressed objectively matters) that their framework denies."),
            P("On logic being a Western cultural framework: this is the most radical version of the postmodern position, and it is genuinely self-destructive. If the law of non-contradiction ('a thing cannot be both A and not-A at the same time') is only a Western cultural assumption, then the postmodernist's claim that 'Christianity is wrong to claim universal truth' is simultaneously right and wrong, and the whole discussion collapses. No sustained argument of any kind is possible without the basic laws of logic - including the argument for postmodernism. The position refutes itself in the most thorough way."),
          ],
          historical: [
            P("The most consistently postmodern political regimes of the 20th century - Soviet Stalinism and Maoist China - were themselves built on the premise that 'truth' is determined by the revolutionary vanguard's class interests, and that bourgeois 'objective' truth was a ruling-class fiction. Foucault's power-knowledge thesis, if applied consistently, explains why these regimes redefined truth to serve power - but it provides no grounds to condemn them, since condemnation requires an objective moral standard above the power structure."),
            P("Christianity's own internal tradition contains the most sustained critique of power-abuse of truth in history. The Hebrew prophets condemned Israel's kings and priests for using religion to oppress the poor. Jesus reserved his harshest words for religious authorities who 'load people with burdens hard to bear' (Luke 11:46). The Reformation slogan sola scriptura was an appeal to a text above the institutional authority that defined what could and couldn't be said. Power-critique is older than Foucault."),

          philosophical: [
            P("Postmodernism is intellectually serious at its best - the recognition that all human knowing is situated, that power distorts truth claims, and that no culture has a God's-eye view of reality. Christians can agree with all three of these observations while noting that they apply equally to postmodernism. The problem is what postmodernism does with these insights: it moves from 'we are all fallible knowers' (true) to 'there is no truth to know' (a non-sequitur). The fallibility of knowers does not entail the non-existence of what is known."),
            P("The Christian framework actually handles the postmodern insights better than postmodernism does: (1) all human knowing is situated - yes, and that is why Scripture itself claims to come from outside the human situation (divine revelation); (2) power distorts truth claims - yes, and the Incarnation is God choosing the powerless position (born to a poor family in an occupied territory, executed by the state) to make his truth claim; (3) no culture has a God's-eye view - yes, and that is precisely why the Christian relies on a God who does, and who has disclosed himself."),

          traps: [

            P("Trap 3 - Defending the church's historical record as if the power-abuse critique has no merit. It has real merit. The answer is that abuses of truth claims don't disprove the truth being abused - and that Christianity's own tradition predicted and condemned exactly those abuses."),
            P("Trap 4 - Assuming that the person saying 'that's your truth' is a trained postmodern philosopher. Usually they have a gut intuition about tolerance and not being judgmental. Meet the intuition, not the theory."),

          questions: [
            LI([
              "\"When you say 'that's just your truth,' is that statement itself just your truth - or is it universally true for everyone? If it's universally true, you've just made the kind of claim you said can't be made. If it's only your truth, I'm free to disagree and we're both right.\"",
              "\"Do you think the Holocaust was objectively wrong - actually, morally wrong, something that should not have happened - or do you think it was wrong from your perspective while the Nazis had an equally valid perspective from theirs? Most people won't say the latter. But 'it was objectively wrong' is a universal moral claim, and you've just made one.\"",
              "\"You condemn colonialism as oppression. But 'oppression' is a moral evaluation, not a neutral description. For that condemnation to be more than just your personal preference, there has to be a standard above all cultures by which this one can be judged wrong. Where does that standard come from on your framework?\"",
              "\"Lyotard says postmodernism is 'incredulity toward meta-narratives.' But The Postmodern Condition itself is a meta-narrative - a universal story about how all universal stories fail. How does postmodernism avoid being the kind of claim it says can't be made?\"",
              "\"Foucault said power and knowledge are inseparable - every truth claim is a power move. Does that apply to Foucault's claim? Is 'power distorts truth' itself just Foucault's power move against competing institutions? If you apply postmodernism to postmodernism, what survives?\"",

          theirTension: [
            P("Postmodernism lives on borrowed moral capital. Its most powerful moves - condemning colonialism, racism, oppression, the silencing of marginalized voices - are all moral judgments that require the existence of objective moral standards above culture. The postmodern can deconstruct every other framework's claim to moral authority but cannot deconstruct the moral authority they need to condemn oppression. The system collapses when applied to itself."),

          ourTension: [

          theirTexts: [

          christianResponse: [
            P("MTD is the most widespread alternative to biblical Christianity in America, and the most dangerous precisely because it uses Christian vocabulary while replacing the Christian message. It must be engaged gently but with clarity."),

            P("On 'good people go to heaven': the foundational problem of the human condition in Scripture is not that people are insufficiently nice - it is that all people, including good-by-human-standards people, fall short of the holiness of God and are under condemnation (Romans 3:23, 6:23). The gospel is not 'try harder to be good enough'; it is 'you cannot be good enough, and Jesus has done what you cannot.' MTD has a sin problem that is too shallow to need the cross - which is why the cross makes no sense within it."),

            P("On 'God knows my heart': Scripture's consistent testimony is that the heart is exactly the problem. Jeremiah 17:9 says the heart is 'deceitful above all things and desperately sick - who can know it?' The gospel does not ask God to accept the heart as it is; it offers a new heart through the Spirit (Ezekiel 36:26). 'God knows my heart' is actually a more frightening claim than MTD users intend."),
            NOTE("Jeremiah 17:9: 'The heart is deceitful above all things, and desperately sick; who can understand it?' This verse directly addresses the MTD confidence that one's sincere intentions are sufficient."),

    // -------------------------------------------------------------------------
    // COMPONENTS

    function Scripture({ vkey }) {
      const v = VERSES[vkey];
      const [showOrig, setShowOrig] = useState(false);
      if (!v) return null;
      return (
        <div className="apx-vcard">
          <div className="apx-vhead">
            <span className="apx-vref">{v.ref}</span>
            <span className="apx-vtag">ESV · KJV</span>
          </div>
          <div className="apx-vbody">
            <div className="apx-vcols two">
              <div className="apx-vcol">
                <div className="apx-vcol-label">English Standard</div>
                <div className="apx-vtext">{v.esv}</div>
              </div>
              <div className="apx-vcol">
                <div className="apx-vcol-label">King James</div>
                <div className="apx-vtext">{v.kjv}</div>
              </div>
            </div>
            {v.original && (
              <>
                <button className="apx-orig-toggle" onClick={() => setShowOrig(s => !s)} aria-expanded={showOrig}>
                  {showOrig ? "▾ Hide" : "▸ Show"} {v.original.lang} text &amp; word notes
                </button>
                {showOrig && (
                  <div className="apx-orig">
                    <div className="apx-orig-lang">{v.original.lang}</div>
                    <div className={"apx-orig-script" + (v.original.lang === "Greek" ? " ltr" : "")}>{v.original.script}</div>
                    <div className="apx-orig-translit">{v.original.translit}</div>
                    {v.original.notes?.map((n, i) => (
                      <div className="apx-wordnote" key={i}>
                        <span className="apx-wordnote-term">{n[0]}</span>
                        <span className="apx-wordnote-tl">{n[1]}</span>
                        <span className="apx-wordnote-gloss">{n[2]}</span>
                      </div>
                    ))}
                  </div>
                )}
              </>
            )}
          </div>
        </div>
      );
    }

    function QuranCard({ qkey }) {
      const q = QURAN[qkey];
      const [showOrig, setShowOrig] = useState(false);
      if (!q) return null;
      return (
        <div className="apx-vcard src">
          <div className="apx-vhead">
            <span className="apx-vref">{q.ref}</span>
            <span className="apx-vtag">Qur'an</span>
          </div>
          <div className="apx-vbody">
            <div className="apx-vcol" style={{ paddingTop: 12 }}>
              <div className="apx-vcol-label">Translation</div>
              <div className="apx-vtext">{q.translation}</div>
            </div>
            <button className="apx-orig-toggle" onClick={() => setShowOrig(s => !s)} aria-expanded={showOrig}>
              {showOrig ? "▾ Hide" : "▸ Show"} Arabic &amp; transliteration
            </button>
            {showOrig && (
              <div className="apx-orig">
                <div className="apx-orig-lang">Arabic</div>
                <div className="apx-orig-script">{q.arabic}</div>
                <div className="apx-orig-translit">{q.translit}</div>
              </div>
            )}
            {q.note && <div className="apx-note" style={{ marginTop: 12 }}>{q.note}</div>}
          </div>
        </div>
      );
    }

    function SourceCard({ skey }) {
      const s = SOURCES[skey];
      if (!s) return null;
      return (
        <div className="apx-vcard src">
          <div className="apx-vhead">
            <span className="apx-vref">{s.ref}</span>
            <span className="apx-vtag">Source</span>
          </div>
          <div className="apx-vbody">
            <div className="apx-vcol" style={{ paddingTop: 12 }}>
              <div className="apx-vcol-label">Quoted</div>
              <div className="apx-vtext" style={{ fontStyle: "italic" }}>{s.original}</div>
            </div>
            {s.note && <div className="apx-note" style={{ marginTop: 12 }}>{s.note}</div>}
          </div>
        </div>
      );
    }

    function Block({ node }) {
      if (node.type === "p") return <p className="apx-p">{node.text}</p>;
      if (node.type === "note") return <div className="apx-note">{node.text}</div>;
      if (node.type === "list")
        return (
          <ul className="apx-ul">
            {node.items.map((it, i) => <li key={i}>{it}</li>)}
          </ul>
        );
      if (node.type === "verse") return <Scripture vkey={node.k} />;
      if (node.type === "quran") return <QuranCard qkey={node.k} />;
      if (node.type === "source") return <SourceCard skey={node.k} />;
      return null;
    }

    function Section({ def, idx, content, open, onToggle }) {
      return (
        <div className={"apx-sec" + (open ? " open" : "")}>
          <button className="apx-sec-btn" onClick={onToggle} aria-expanded={open}>
            <span className="apx-sec-icon">{def.icon}</span>
            <span className="apx-sec-num">{String(idx + 1).padStart(2, "0")}</span>
            <span className="apx-sec-label">{def.label}</span>
            <span className="apx-sec-caret">▶</span>
          </button>
          {open && (
            <div className="apx-sec-body">
              {content.map((node, i) => <Block node={node} key={i} />)}
            </div>
          )}
        </div>
      );
    }

    function WorldviewDetail({ wv, onHome }) {
      const [openKeys, setOpenKeys] = useState(() => new Set(wv.status === "full" ? ["believe"] : []));
      const topRef = useRef(null);

      useEffect(() => {
        topRef.current?.scrollIntoView({ block: "start" });
      }, [wv.id]);

      const toggle = (k) =>
        setOpenKeys(prev => {
          const n = new Set(prev);
          n.has(k) ? n.delete(k) : n.add(k);
          return n;
        });

      const allOpen = wv.status === "full" && openKeys.size === SECTION_DEFS.length;
      const expandAll = () => setOpenKeys(allOpen ? new Set() : new Set(SECTION_DEFS.map(d => d.key)));

      return (
        <div ref={topRef}>
          <div className="apx-detail-head">
            <div className="apx-detail-fam">{wv.family}</div>
            <h1 className="apx-detail-h">{wv.name}</h1>
            <p className="apx-detail-tag">{wv.tagline}</p>
          </div>

          {wv.status === "full" ? (
            <>
              <div className="apx-progress">
                <button className="apx-prog-pill" onClick={expandAll}>
                  {allOpen ? "Collapse all 14" : "Expand all 14"}
                </button>
              </div>
              {SECTION_DEFS.map((def, idx) => (
                <Section
                  key={def.key}
                  def={def}
                  idx={idx}
                  content={wv.sections[def.key] || [P("-")]}
                  open={openKeys.has(def.key)}
                  onToggle={() => toggle(def.key)}
                />
              ))}
            </>
          ) : (
            <div className="apx-stub">
              <h3>Ready to populate</h3>
              <p>
                The full 14-part debate map for {wv.name} isn't written yet. The app structure,
                scripture engine, and original-language display are all in place - this entry just
                needs its content filled in.
              </p>
              <p style={{ color: "var(--ink-faint)", fontSize: 14 }}>Each section will cover:</p>
              <ul>
                {SECTION_DEFS.map(d => <li key={d.key}>{d.icon} {d.label}</li>)}
              </ul>
            </div>
          )}

          <div className="apx-foot">
            Verses are shown ESV and KJV side by side. Original Hebrew, Greek, Aramaic, and
            Arabic appear behind the "show" toggles with transliteration and word notes. Every
            opposing view is stated at its strongest before it is answered.
          </div>
        </div>
      );
    }

    function RankList({ items }) {
      const [open, setOpen] = useState(null);
      return (
        <div className="apx-rank">
          {items.map(it => (
            <div className="apx-rankitem" key={it.n}>
              <button
                className="apx-rankbtn"
                onClick={() => setOpen(open === it.n ? null : it.n)}
                aria-expanded={open === it.n}
              >
                <span className="apx-ranknum">{it.n}</span>
                <span className="apx-ranktitle">{it.title}</span>
                <span className="apx-sec-caret" style={{ transform: open === it.n ? "rotate(90deg)" : "none" }}>▶</span>
              </button>
              {open === it.n && <div className="apx-rankbody">{it.body}</div>}
            </div>
          ))}
        </div>
      );
    }

    function Index({ onPick }) {
      return (
        <>
          <div className="apx-hero">
            <div className="apx-eyebrow">My Apologetics Debate Map</div>
            <h1 className="apx-h1">
              Steelman every view.<br />
              Then answer it with <span className="glow">the text itself.</span>
            </h1>
            <p className="apx-lead">
              A debate-ready map of major world religions and worldviews - stated at full strength,
              then answered with Scripture (ESV &amp; KJV side by side) plus the original Hebrew,
              Greek, Aramaic, or Arabic with word notes.
            </p>
            <div className="apx-meta-row">
              <span className="apx-chip">14-part structure</span>
              <span className="apx-chip">Original-language text</span>
              <span className="apx-chip">No strawmen</span>
              <span className="apx-chip">One focus at a time</span>
            </div>
          </div>

          <div className="apx-section-label">Worldviews</div>
          <div className="apx-grid">
            {WORLDVIEWS.map(wv => (
              <button key={wv.id} className={"apx-card" + (wv.status === "stub" ? " is-stub" : "")} onClick={() => onPick(wv.id)}>
                <div className="apx-card-name">{wv.name}</div>
                <p className="apx-card-tag">{wv.tagline}</p>
                <div className="apx-card-foot">
                  <span className="apx-card-fam">{wv.family}</span>
                  <span className={"apx-badge " + (wv.status === "full" ? "ready" : "soon")}>
                    {wv.status === "full" ? "Full map" : "Ready to fill"}
                  </span>
                </div>
              </button>
            ))}
          </div>

          <div className="apx-section-label">Strongest objections to Christianity</div>
          <p className="apx-lead" style={{ fontSize: 15, marginBottom: 4 }}>
            Tap any one for the answer, the likely rebuttal, and the best question to ask back.
          </p>
          <RankList items={TOP_OBJECTIONS} />

          <div className="apx-section-label">Strongest arguments for Christianity</div>
          <p className="apx-lead" style={{ fontSize: 15, marginBottom: 4 }}>
            Tap any one for the evidence, the objection, the response, and the pressure point.
          </p>
          <RankList items={TOP_ARGUMENTS} />

          <div className="apx-foot">
            Three full maps are written (Islam, Jehovah's Witnesses, Judaism). The remaining
            seventeen are scaffolded and ready to expand. Every opposing view is made as strong
            as possible before it is answered.
          </div>
        </>
      );
    }

    function ApologeticsMap() {
      const [activeId, setActiveId] = useState(null);
      const active = useMemo(() => WORLDVIEWS.find(w => w.id === activeId), [activeId]);

      return (
        <div className="apx">
          <style>{CSS}</style>
          <div className="apx-top">
            <div className="apx-top-inner">
              <div className="apx-mark">
                My Debate Map
                <small>Christian Apologetics</small>
              </div>
              {active && (
                <button className="apx-home-btn" onClick={() => setActiveId(null)}>
                  ← All worldviews
                </button>
              )}
            </div>
          </div>
          <div className="apx-wrap">
            {active
              ? <WorldviewDetail wv={active} onHome={() => setActiveId(null)} />
              : <Index onPick={setActiveId} />
            }
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<ApologeticsMap />);
    document.getElementById('loading').style.display = 'none';
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
